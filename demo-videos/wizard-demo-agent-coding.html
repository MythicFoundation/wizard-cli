<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #0D1117;
  overflow: hidden;
  position: relative;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

/* Ambient background glows */
.bg-glow-1 {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: #9945FF;
  filter: blur(200px);
  opacity: 0.06;
  top: -100px; left: -100px;
}
.bg-glow-2 {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: #14F195;
  filter: blur(180px);
  opacity: 0.04;
  bottom: -100px; right: -100px;
}

/* Grid overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(153,69,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(153,69,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Top gradient bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #9945FF, #14F195);
  z-index: 100;
}

/* Terminal window */
.terminal {
  position: absolute;
  top: 40px; left: 60px; right: 60px; bottom: 80px;
  background: rgba(13, 17, 23, 0.95);
  border: 1px solid rgba(153, 69, 255, 0.2);
  border-radius: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.terminal-header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  background: rgba(22, 27, 34, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #FF5F57; }
.dot-y { background: #FEBC2E; }
.dot-g { background: #28C840; }
.terminal-title {
  color: #484858;
  font-size: 14px;
  margin-left: 12px;
  letter-spacing: 1px;
}

.terminal-body {
  flex: 1;
  padding: 30px 40px;
  overflow: hidden;
  font-size: 22px;
  line-height: 1.65;
}

/* ASCII banner container */
.banner {
  opacity: 0;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.15;
  white-space: pre;
}

/* Line styles */
.line {
  opacity: 0;
  transform: translateY(4px);
  transition: none;
  white-space: nowrap;
}
.line.visible {
  opacity: 1;
  transform: translateY(0);
}

.prompt { color: #14F195; font-weight: 700; }
.cmd { color: #FFFFFF; font-weight: 500; }
.dim { color: #484858; }
.green { color: #14F195; }
.purple { color: #9945FF; }
.yellow { color: #FEBC2E; }
.cyan { color: #00E5FF; }
.white { color: #E0E0E8; }
.orange { color: #FF9500; }
.pink { color: #FF2D78; }
.bold { font-weight: 700; }

/* Tool call badge */
.tool-badge {
  display: inline-block;
  padding: 2px 10px;
  background: rgba(153, 69, 255, 0.12);
  border: 1px solid rgba(153, 69, 255, 0.3);
  border-radius: 0;
  font-size: 18px;
  margin-right: 8px;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity 0.3s, transform 0.3s;
}
.tool-badge.visible {
  opacity: 1;
  transform: scale(1);
}
.tool-badge.green-badge {
  background: rgba(20, 241, 149, 0.1);
  border-color: rgba(20, 241, 149, 0.3);
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 12px;
  height: 24px;
  background: #14F195;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Bottom status bar */
.status-bar {
  position: absolute;
  bottom: 0; left: 60px; right: 60px;
  height: 44px;
  background: rgba(22, 27, 34, 0.9);
  border-top: 1px solid rgba(153, 69, 255, 0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 15px;
  opacity: 0;
  transition: opacity 0.5s;
}
.status-bar.visible { opacity: 1; }
.status-left { color: #484858; }
.status-right { color: #14F195; font-weight: 600; }

/* Watermark */
.watermark {
  position: absolute;
  top: 52px; right: 80px;
  font-family: 'Sora', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.5s;
}
.watermark.visible { opacity: 0.3; }
.watermark span:first-child { color: #FFFFFF; }
.watermark span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CTA overlay */
.cta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 17, 23, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s;
}
.cta-overlay.visible {
  opacity: 1;
}
.cta-title {
  font-family: 'Sora', sans-serif;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: 6px;
  margin-bottom: 20px;
}
.cta-title span:first-child { color: #FFFFFF; }
.cta-title span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.cta-sub {
  font-size: 22px;
  color: #686878;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 50px;
  font-family: 'Inter', sans-serif;
}
.cta-cmd {
  font-size: 28px;
  padding: 16px 40px;
  background: rgba(153, 69, 255, 0.1);
  border: 1px solid rgba(153, 69, 255, 0.4);
  border-radius: 0;
  margin-bottom: 20px;
}
.cta-cmd .prompt-cta { color: #14F195; font-weight: 700; }
.cta-cmd .cmd-cta { color: #FFFFFF; }
.cta-url {
  font-size: 18px;
  color: #14F195;
  letter-spacing: 3px;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<div class="grid-overlay"></div>
<div class="top-bar"></div>

<div class="watermark" id="watermark">
  <span>WIZARD </span><span>CLI</span>
</div>

<div class="terminal">
  <div class="terminal-header">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="terminal-title">wizard -- ~/mythic-l2</span>
  </div>
  <div class="terminal-body" id="body">
    <div class="banner" id="banner"></div>
    <div id="lines"></div>
  </div>
</div>

<div class="status-bar" id="statusbar">
  <div class="status-left" id="status-left">Claude Opus 4.6 | Mythic L2 | auto mode</div>
  <div class="status-right" id="status-right"></div>
</div>

<div class="cta-overlay" id="cta">
  <div class="cta-title"><span>WIZARD </span><span>CLI</span></div>
  <div class="cta-sub">AI-Powered Solana Development</div>
  <div class="cta-cmd">
    <span class="prompt-cta">$ </span><span class="cmd-cta">curl mythic.sh/wizard | bash</span>
  </div>
  <div class="cta-url">wizardcli.com</div>
</div>

<script>
const BANNER_ART = [
  '                 /\\',
  '                /  \\',
  '               / *  \\',
  '              /      \\',
  '             /   /\\   \\',
  '            /   /  \\   \\',
  '           /   /    \\   \\',
  '    ______/___/______\\___\\______',
  '   |______________________________|',
  '',
  '   W I Z A R D   C L I   v1.0.0',
];

// Animation script — sequence of events
const SCRIPT = [
  // [delay_ms, type, data]
  [0,    'banner', null],
  [800,  'line', { html: '<span class="prompt">wizard &#9678; </span><span class="cmd" id="typed-cmd"></span><span class="cursor" id="cursor1"></span>' }],
  [400,  'type', { target: 'typed-cmd', text: 'Write a Mythic L2 staking program that tracks validator uptime', speed: 25 }],
  [600,  'hide', 'cursor1'],
  [200,  'line', { html: '' }],
  [100,  'line', { html: '<span class="purple">&#129302; spawn_agent</span> <span class="dim">program-engineer</span>' }],
  [300,  'line', { html: '<span class="dim">  &#9474; Building staking program with uptime tracking...</span>' }],
  [700,  'line', { html: '' }],
  [200,  'line', { html: '<span class="purple">&#128193; write_file</span> <span class="dim">programs/staking-v2/src/lib.rs</span>' }],
  [400,  'line', { html: '<span class="dim">  &#9474;</span> <span class="purple">use</span> <span class="white">solana_program::{account_info::AccountInfo,</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    entrypoint::ProgramResult, program_pack::Pack,</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    pubkey::Pubkey, msg};</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="purple">use</span> <span class="white">borsh::{BorshDeserialize, BorshSerialize};</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="purple">pub fn</span> <span class="green">process_record_uptime</span><span class="white">(</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    accounts: &[AccountInfo],</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    slot: </span><span class="yellow">u64</span><span class="white">,</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">) -> ProgramResult {</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    </span><span class="purple">let</span><span class="white"> validator = next_account_info(iter)?;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    </span><span class="purple">let mut</span><span class="white"> record = UptimeRecord::unpack(&validator.data.borrow())?;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    record.last_slot = slot;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    record.total_slots = record.total_slots.checked_add(</span><span class="orange">1</span><span class="white">)</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">        .ok_or(ProgramError::ArithmeticOverflow)?;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    msg!(</span><span class="green">"Uptime: {}/{}"</span><span class="white">, record.total_slots, record.expected_slots);</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    UptimeRecord::pack(record, &mut validator.data.borrow_mut())?;</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">    Ok(())</span>' }],
  [80,   'line', { html: '<span class="dim">  &#9474;</span> <span class="white">}</span>' }],
  [600,  'line', { html: '' }],
  [200,  'line', { html: '<span class="yellow">&#9889; bash</span> <span class="dim">cargo build-sbf</span>' }],
  [400,  'line', { html: '<span class="dim">  &#9474; Compiling staking-v2 v0.1.0</span>' }],
  [800,  'line', { html: '<span class="green">  &#9474; Finished release [optimized]</span>' }],
  [400,  'line', { html: '' }],
  [100,  'status', { left: 'Claude Opus 4.6 | Mythic L2 | auto mode', right: '3.2s | $0.04' }],
  [200,  'line', { html: '<span class="dim">  3.2s &#183; $0.04</span>' }],
  [500,  'line', { html: '' }],
  [100,  'line', { html: '<span class="prompt">wizard &#9678; </span><span class="cursor"></span>' }],
  [3000, 'cta', null],
];

// Engine
const linesEl = document.getElementById('lines');
const bannerEl = document.getElementById('banner');
const statusBar = document.getElementById('statusbar');
const watermark = document.getElementById('watermark');
const ctaOverlay = document.getElementById('cta');
let scriptIndex = 0;

function addLine(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  linesEl.appendChild(div);
  // Trigger reflow then show
  requestAnimationFrame(() => {
    div.classList.add('visible');
  });
  return div;
}

function typeText(targetId, text, speed) {
  return new Promise((resolve) => {
    const el = document.getElementById(targetId);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

function showBanner() {
  const gradientColors = [
    '#9945FF', '#9945FF', '#A050FF', '#AA5CFF', '#B468FF',
    '#BE74FF', '#B87AEE', '#7ECC90', '#50E0A0', '#14F195', '#14F195'
  ];
  let html = '';
  BANNER_ART.forEach((line, i) => {
    const color = gradientColors[i] || '#14F195';
    html += `<span style="color:${color}">${line.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>\n`;
  });
  bannerEl.innerHTML = html;
  bannerEl.style.opacity = '1';
}

async function runScript() {
  watermark.classList.add('visible');
  statusBar.classList.add('visible');

  for (let i = 0; i < SCRIPT.length; i++) {
    const [delay, type, data] = SCRIPT[i];
    await new Promise(r => setTimeout(r, delay));

    switch (type) {
      case 'banner':
        showBanner();
        break;
      case 'line':
        addLine(data.html);
        break;
      case 'type':
        await typeText(data.target, data.text, data.speed);
        break;
      case 'hide':
        const hideEl = document.getElementById(data);
        if (hideEl) hideEl.style.display = 'none';
        break;
      case 'status':
        document.getElementById('status-left').textContent = data.left;
        document.getElementById('status-right').textContent = data.right;
        break;
      case 'cta':
        ctaOverlay.classList.add('visible');
        break;
    }
  }
}

// Start after a small delay
setTimeout(runScript, 300);
</script>
</body>
</html>
