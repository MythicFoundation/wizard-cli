<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #0D1117;
  overflow: hidden;
  position: relative;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

/* Ambient background glows */
.bg-glow-1 {
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: #9945FF;
  filter: blur(220px);
  opacity: 0.05;
  top: -200px; left: 200px;
  animation: drift1 20s ease-in-out infinite alternate;
}
.bg-glow-2 {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: #14F195;
  filter: blur(200px);
  opacity: 0.04;
  bottom: -150px; right: 200px;
  animation: drift2 18s ease-in-out infinite alternate;
}
.bg-glow-3 {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: #FF9500;
  filter: blur(180px);
  opacity: 0.02;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
@keyframes drift1 { to { transform: translate(80px, 40px); } }
@keyframes drift2 { to { transform: translate(-60px, -30px); } }

/* Grid overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(153,69,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(20,241,149,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Top gradient bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #9945FF, #FF9500, #14F195);
  z-index: 100;
}

/* Terminal window */
.terminal {
  position: absolute;
  top: 40px; left: 60px; right: 60px; bottom: 80px;
  background: rgba(13, 17, 23, 0.95);
  border: 1px solid rgba(153, 69, 255, 0.15);
  border-radius: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.terminal-header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  background: rgba(22, 27, 34, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #FF5F57; }
.dot-y { background: #FEBC2E; }
.dot-g { background: #28C840; }
.terminal-title {
  color: #484858;
  font-size: 14px;
  margin-left: 12px;
  letter-spacing: 1px;
}

.terminal-body {
  flex: 1;
  padding: 24px 40px;
  overflow: hidden;
  font-size: 22px;
  line-height: 1.6;
}

/* ASCII banner */
.banner {
  opacity: 0;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.15;
  white-space: pre;
  transition: opacity 0.4s;
}
.banner.visible { opacity: 1; }

/* Line styles */
.line {
  opacity: 0;
  transform: translateY(3px);
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.15s;
}
.line.visible {
  opacity: 1;
  transform: translateY(0);
}

.prompt { color: #14F195; font-weight: 700; }
.cmd { color: #FFFFFF; font-weight: 500; }
.dim { color: #484858; }
.green { color: #14F195; }
.purple { color: #9945FF; }
.yellow { color: #FEBC2E; }
.cyan { color: #00E5FF; }
.white { color: #E0E0E8; }
.orange { color: #FF9500; }
.pink { color: #FF2D78; }
.bold { font-weight: 700; }
.red { color: #FF5F57; }

/* Cursor */
.cursor {
  display: inline-block;
  width: 11px;
  height: 23px;
  background: #14F195;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Bottom status bar */
.status-bar {
  position: absolute;
  bottom: 0; left: 60px; right: 60px;
  height: 44px;
  background: rgba(22, 27, 34, 0.9);
  border-top: 1px solid rgba(153, 69, 255, 0.12);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 15px;
  opacity: 0;
  transition: opacity 0.5s;
}
.status-bar.visible { opacity: 1; }
.status-left { color: #484858; }
.status-right { color: #14F195; font-weight: 600; }

/* Watermark */
.watermark {
  position: absolute;
  top: 52px; right: 80px;
  font-family: 'Sora', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.5s;
}
.watermark.visible { opacity: 0.3; }
.watermark span:first-child { color: #FFFFFF; }
.watermark span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Section divider */
.section-fade {
  position: absolute;
  inset: 0;
  background: #0D1117;
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}
.section-fade.visible { opacity: 1; }

/* CTA overlay */
.cta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 17, 23, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s;
}
.cta-overlay.visible { opacity: 1; }
.cta-title {
  font-family: 'Sora', sans-serif;
  font-size: 72px;
  font-weight: 800;
  letter-spacing: 8px;
  margin-bottom: 20px;
}
.cta-title span:first-child { color: #FFFFFF; }
.cta-title span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.cta-sub {
  font-size: 24px;
  color: #686878;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 50px;
  font-family: 'Inter', sans-serif;
}
.cta-features {
  display: flex;
  gap: 20px;
  margin-bottom: 50px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1200px;
}
.cta-pill {
  padding: 10px 22px;
  border: 1px solid rgba(153, 69, 255, 0.3);
  background: rgba(153, 69, 255, 0.06);
  font-size: 16px;
  color: #9945FF;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s, transform 0.4s;
}
.cta-pill.visible { opacity: 1; transform: translateY(0); }
.cta-pill.green-pill {
  border-color: rgba(20, 241, 149, 0.3);
  background: rgba(20, 241, 149, 0.06);
  color: #14F195;
}
.cta-pill.orange-pill {
  border-color: rgba(255, 149, 0, 0.3);
  background: rgba(255, 149, 0, 0.06);
  color: #FF9500;
}
.cta-pill.cyan-pill {
  border-color: rgba(0, 229, 255, 0.3);
  background: rgba(0, 229, 255, 0.06);
  color: #00E5FF;
}
.cta-cmd {
  font-size: 30px;
  padding: 18px 48px;
  background: rgba(153, 69, 255, 0.08);
  border: 1px solid rgba(153, 69, 255, 0.3);
  border-radius: 0;
  margin-bottom: 24px;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.5s, transform 0.5s;
}
.cta-cmd.visible { opacity: 1; transform: scale(1); }
.cta-cmd .prompt-cta { color: #14F195; font-weight: 700; }
.cta-cmd .cmd-cta { color: #FFFFFF; }
.cta-url {
  font-size: 20px;
  color: #14F195;
  letter-spacing: 4px;
  opacity: 0;
  transition: opacity 0.5s 0.3s;
}
.cta-url.visible { opacity: 0.7; }
</style>
</head>

  [80,   'line', '  <span class="purple">&#9670;</span> <span class="white">bridge-security</span> <span class="dim">— Bridge ops &amp; auditing</span>'],
  [80,   'line', '  <span class="purple">&#9670;</span> <span class="white">defi-ops</span> <span class="dim">— Pool management, price sync</span>'],
  [80,   'line', '  <span class="purple">&#9670;</span> <span class="white">frontend-dev</span> <span class="dim">— Next.js 14 + Tailwind</span>'],
  [300,  'empty'],
  [80,   'status', { left: 'Claude Opus 4.6 | Mythic L2 | auto mode', right: '0.4s | $0.01' }],
  [100,  'line', '<span class="dim">  0.4s &#183; $0.01</span>'],
  [300,  'empty'],
  [80,   'line', '<span class="prompt">wizard &#9678; </span><span class="cursor"></span>'],
];

// ─── Engine ──────────────────────────────────────────────────────
const linesEl = document.getElementById('lines');
const bannerEl = document.getElementById('banner');
const statusBar = document.getElementById('statusbar');
const watermark = document.getElementById('watermark');
const ctaOverlay = document.getElementById('cta');
const sectionFade = document.getElementById('section-fade');

function addLine(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  linesEl.appendChild(div);
  requestAnimationFrame(() => div.classList.add('visible'));
  return div;
}

function typeText(targetId, text, speed) {
  return new Promise(resolve => {
    const el = document.getElementById(targetId);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

function showBanner() {
  const colors = [
    '#9945FF','#9945FF','#A050FF','#AA5CFF','#B468FF',
    '#BE74FF','#B87AEE','#7ECC90','#50E0A0','#14F195','#14F195'
  ];
  let html = '';
  BANNER_ART.forEach((line, i) => {
    const c = colors[i] || '#14F195';
    html += `<span style="color:${c}">${line.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>\n`;
  });
  bannerEl.innerHTML = html;
  bannerEl.classList.add('visible');
}

async function clearTerminal() {
  sectionFade.classList.add('visible');
  await new Promise(r => setTimeout(r, 400));
  linesEl.innerHTML = '';
  bannerEl.innerHTML = '';
  bannerEl.classList.remove('visible');
  await new Promise(r => setTimeout(r, 200));
  sectionFade.classList.remove('visible');
  await new Promise(r => setTimeout(r, 300));
}

async function runScene(script) {
  for (const step of script) {
    const [delay, type, data] = step;
    await new Promise(r => setTimeout(r, delay));

    switch (type) {
      case 'banner': showBanner(); break;
      case 'line': addLine(data); break;
      case 'empty': addLine('&nbsp;'); break;
      case 'type': await typeText(data.target, data.text, data.speed); break;
      case 'hide': {
        const el = document.getElementById(data);
        if (el) el.style.display = 'none';
        break;
      }
      case 'status': {
        document.getElementById('status-left').textContent = data.left;
        document.getElementById('status-right').textContent = data.right;
        break;
      }
    }
  }
}

function showCTA() {
  ctaOverlay.classList.add('visible');
  // Animate pills
  document.querySelectorAll('.cta-pill').forEach(pill => {
    const d = parseInt(pill.dataset.delay || 0);
    setTimeout(() => pill.classList.add('visible'), d);
  });
  setTimeout(() => document.getElementById('cta-cmd').classList.add('visible'), 900);
  setTimeout(() => document.getElementById('cta-url').classList.add('visible'), 1100);
}

async function main() {
  watermark.classList.add('visible');
  statusBar.classList.add('visible');

  // Scene 1: Agent coding
  await runScene(SCENE_1);
  await new Promise(r => setTimeout(r, 1500));

  // Transition
  await clearTerminal();

  // Scene 2: Blockchain tools
  await runScene(SCENE_2);
  await new Promise(r => setTimeout(r, 1500));

  // Transition
  await clearTerminal();

  // Scene 3: Skills, memory, permissions, agents
  await runScene(SCENE_3);
  await new Promise(r => setTimeout(r, 2000));

  // CTA
  showCTA();
}

setTimeout(main, 400);
</script>
