<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #0D1117;
  overflow: hidden;
  position: relative;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

/* Ambient background glows */
.bg-glow-1 {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: #9945FF;
  filter: blur(200px);
  opacity: 0.06;
  top: -100px; right: -100px;
}
.bg-glow-2 {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: #14F195;
  filter: blur(180px);
  opacity: 0.04;
  bottom: -100px; left: -100px;
}

/* Grid overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(20,241,149,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(20,241,149,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Top gradient bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #14F195, #9945FF, #14F195);
  z-index: 100;
}

/* Terminal window */
.terminal {
  position: absolute;
  top: 40px; left: 60px; right: 60px; bottom: 80px;
  background: rgba(13, 17, 23, 0.95);
  border: 1px solid rgba(20, 241, 149, 0.15);
  border-radius: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.terminal-header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  background: rgba(22, 27, 34, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #FF5F57; }
.dot-y { background: #FEBC2E; }
.dot-g { background: #28C840; }
.terminal-title {
  color: #484858;
  font-size: 14px;
  margin-left: 12px;
  letter-spacing: 1px;
}

.terminal-body {
  flex: 1;
  padding: 30px 40px;
  overflow: hidden;
  font-size: 22px;
  line-height: 1.65;
}

/* ASCII banner */
.banner {
  opacity: 0;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.15;
  white-space: pre;
}

/* Line styles */
.line {
  opacity: 0;
  transform: translateY(4px);
  white-space: nowrap;
}
.line.visible {
  opacity: 1;
  transform: translateY(0);
}

.prompt { color: #14F195; font-weight: 700; }
.cmd { color: #FFFFFF; font-weight: 500; }
.dim { color: #484858; }
.green { color: #14F195; }
.purple { color: #9945FF; }
.yellow { color: #FEBC2E; }
.cyan { color: #00E5FF; }
.white { color: #E0E0E8; }
.orange { color: #FF9500; }
.pink { color: #FF2D78; }
.bold { font-weight: 700; }

/* Tool result card */
.result-card {
  display: inline-block;
  padding: 2px 8px;
  font-size: 18px;
}

/* Badge */
.tool-icon {
  display: inline;
  font-size: 22px;
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 12px;
  height: 24px;
  background: #14F195;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Stat value highlight */
.stat-val {
  color: #FFFFFF;
  font-weight: 700;
}
.stat-label {
  color: #686878;
}

/* Bottom status bar */
.status-bar {
  position: absolute;
  bottom: 0; left: 60px; right: 60px;
  height: 44px;
  background: rgba(22, 27, 34, 0.9);
  border-top: 1px solid rgba(20, 241, 149, 0.12);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 15px;
  opacity: 0;
  transition: opacity 0.5s;
}
.status-bar.visible { opacity: 1; }
.status-left { color: #484858; }
.status-right { color: #14F195; font-weight: 600; }

/* Watermark */
.watermark {
  position: absolute;
  top: 52px; right: 80px;
  font-family: 'Sora', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.5s;
}
.watermark.visible { opacity: 0.3; }
.watermark span:first-child { color: #FFFFFF; }
.watermark span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CTA overlay */
.cta-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 17, 23, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s;
}
.cta-overlay.visible { opacity: 1; }
.cta-title {
  font-family: 'Sora', sans-serif;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: 6px;
  margin-bottom: 20px;
}
.cta-title span:first-child { color: #FFFFFF; }
.cta-title span:last-child {
  background: linear-gradient(135deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.cta-sub {
  font-size: 22px;
  color: #686878;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 50px;
  font-family: 'Inter', sans-serif;
}
.cta-cmd {
  font-size: 28px;
  padding: 16px 40px;
  background: rgba(20, 241, 149, 0.08);
  border: 1px solid rgba(20, 241, 149, 0.3);
  border-radius: 0;
  margin-bottom: 20px;
}
.cta-cmd .prompt-cta { color: #14F195; font-weight: 700; }
.cta-cmd .cmd-cta { color: #FFFFFF; }
.cta-url {
  font-size: 18px;
  color: #14F195;
  letter-spacing: 3px;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<div class="grid-overlay"></div>
<div class="top-bar"></div>

<div class="watermark" id="watermark">
  <span>WIZARD </span><span>CLI</span>
</div>

<div class="terminal">
  <div class="terminal-header">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="terminal-title">wizard -- ~/mythic-l2</span>
  </div>
  <div class="terminal-body" id="body">
    <div class="banner" id="banner"></div>
    <div id="lines"></div>
  </div>
</div>

<div class="status-bar" id="statusbar">
  <div class="status-left" id="status-left">Claude Opus 4.6 | Mythic L2 | auto mode</div>
  <div class="status-right" id="status-right"></div>
</div>

<div class="cta-overlay" id="cta">
  <div class="cta-title"><span>WIZARD </span><span>CLI</span></div>
  <div class="cta-sub">27 Blockchain Tools Built In</div>
  <div class="cta-cmd">
    <span class="prompt-cta">$ </span><span class="cmd-cta">curl -sSfL https://mythic.sh/wizard | bash</span>
  </div>
  <div class="cta-url">wizardcli.com</div>
</div>

<script>
const BANNER_ART = [
  '                 /\\',
  '                /  \\',
  '               / *  \\',
  '              /      \\',
  '             /   /\\   \\',
  '            /   /  \\   \\',
  '           /   /    \\   \\',
  '    ______/___/______\\___\\______',
  '   |______________________________|',
  '',
  '   W I Z A R D   C L I   v1.0.0',
];

const SCRIPT = [
  [0,    'banner', null],
  [800,  'line', { html: '<span class="prompt">wizard &#9678; </span><span class="cmd" id="typed-cmd1"></span><span class="cursor" id="cursor1"></span>' }],
  [400,  'type', { target: 'typed-cmd1', text: 'Check Mythic L2 network status and my wallet', speed: 28 }],
  [500,  'hide', 'cursor1'],
  [300,  'line', { html: '' }],

  // Network status tool
  [100,  'line', { html: '<span class="purple">&#128302; mythic_network_status</span>' }],
  [300,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Network:</span> <span class="stat-val">Mythic L2</span> <span class="dim">(Firedancer v0.812)</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Slot:</span> <span class="green bold">1,847,329</span>  <span class="stat-label">Block:</span> <span class="green bold">1,847,329</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">TPS:</span> <span class="stat-val">2,450</span>  <span class="stat-label">Epoch:</span> <span class="stat-val">4</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Supply:</span> <span class="cyan bold">1.12B MYTH</span>  <span class="stat-label">Burned:</span> <span class="orange bold">847K</span>' }],

  [500,  'line', { html: '' }],

  // Wallet overview tool
  [100,  'line', { html: '<span class="purple">&#128302; mythic_wallet_overview</span> <span class="dim">DLB2NZ5P...</span>' }],
  [300,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Balance:</span> <span class="stat-val bold">100,000 MYTH</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Tokens:</span> <span class="stat-val">50,000 wSOL</span><span class="dim">,</span> <span class="stat-val">10,000 USDC</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Staked:</span> <span class="green">25,000 MYTH</span> <span class="dim">(2x multiplier)</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Recent:</span> <span class="stat-val">12 transactions</span> <span class="green">(all success)</span>' }],

  [500,  'line', { html: '' }],

  // Solana balance check
  [100,  'line', { html: '<span class="yellow">&#9678; solana_balance</span> <span class="dim">4pPDuqj4...</span>' }],
  [300,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-val bold">1.58 SOL</span> <span class="dim">(mainnet-beta)</span>' }],

  [500,  'line', { html: '' }],

  // Bridge status
  [100,  'line', { html: '<span class="purple">&#128302; mythic_bridge_status</span>' }],
  [300,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Escrow:</span> <span class="stat-val bold">4,231 SOL</span> <span class="green">&#9679; healthy</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Pending:</span> <span class="stat-val">0 withdrawals</span>  <span class="stat-label">24h vol:</span> <span class="stat-val">892 SOL</span>' }],
  [150,  'line', { html: '<span class="dim">  &#9474;</span> <span class="stat-label">Challenge:</span> <span class="stat-val">24h</span>  <span class="stat-label">Max:</span> <span class="stat-val">1,000 SOL</span>  <span class="stat-label">Daily:</span> <span class="stat-val">10K SOL</span>' }],

  [400,  'line', { html: '' }],
  [100,  'status', { left: 'Claude Opus 4.6 | Mythic L2 | auto mode', right: '2.1s | $0.02' }],
  [200,  'line', { html: '<span class="dim">  2.1s &#183; $0.02</span>' }],
  [500,  'line', { html: '' }],
  [100,  'line', { html: '<span class="prompt">wizard &#9678; </span><span class="cursor"></span>' }],
  [3000, 'cta', null],
];

// Engine
const linesEl = document.getElementById('lines');
const bannerEl = document.getElementById('banner');
const statusBar = document.getElementById('statusbar');
const watermark = document.getElementById('watermark');
const ctaOverlay = document.getElementById('cta');

function addLine(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  linesEl.appendChild(div);
  requestAnimationFrame(() => {
    div.classList.add('visible');
  });
  return div;
}

function typeText(targetId, text, speed) {
  return new Promise((resolve) => {
    const el = document.getElementById(targetId);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

function showBanner() {
  const gradientColors = [
    '#9945FF', '#9945FF', '#A050FF', '#AA5CFF', '#B468FF',
    '#BE74FF', '#B87AEE', '#7ECC90', '#50E0A0', '#14F195', '#14F195'
  ];
  let html = '';
  BANNER_ART.forEach((line, i) => {
    const color = gradientColors[i] || '#14F195';
    html += `<span style="color:${color}">${line.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>\n`;
  });
  bannerEl.innerHTML = html;
  bannerEl.style.opacity = '1';
}

async function runScript() {
  watermark.classList.add('visible');
  statusBar.classList.add('visible');

  for (let i = 0; i < SCRIPT.length; i++) {
    const [delay, type, data] = SCRIPT[i];
    await new Promise(r => setTimeout(r, delay));

    switch (type) {
      case 'banner':
        showBanner();
        break;
      case 'line':
        addLine(data.html);
        break;
      case 'type':
        await typeText(data.target, data.text, data.speed);
        break;
      case 'hide':
        const hideEl = document.getElementById(data);
        if (hideEl) hideEl.style.display = 'none';
        break;
      case 'status':
        document.getElementById('status-left').textContent = data.left;
        document.getElementById('status-right').textContent = data.right;
        break;
      case 'cta':
        ctaOverlay.classList.add('visible');
        break;
    }
  }
}

setTimeout(runScript, 300);
</script>
</body>
</html>
