<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="hatTop" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="hatMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FCC"/>
      <stop offset="50%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD4A8"/>
      <stop offset="100%" stop-color="#E8B878"/>
    </linearGradient>
    <linearGradient id="beard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <linearGradient id="robe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B20D6"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="starG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="eyeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#00CC77"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0A40"/>
      <stop offset="70%" stop-color="#0A0520"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" rx="200" fill="url(#bg)"/>
  <rect width="1000" height="1000" rx="200" fill="url(#aura)"/>

  <!-- Outer ring -->
  <rect x="8" y="8" width="984" height="984" rx="196" fill="none" stroke="url(#sol)" stroke-width="4" opacity="0.35"/>

  <!-- 8-BIT PIXEL GRID: each "pixel" is 25x25 units -->
  <!-- Grid origin at (100, 60) — 32x36 pixel canvas -->

  <!-- ═══ HAT TIP (top, narrow) ═══ -->
  <!-- Row 0-1: tip sparkle -->
  <rect x="475" y="35" width="50" height="25" fill="#14F195" filter="url(#glow8)"/>

  <!-- Row 2: tip -->
  <rect x="450" y="60" width="100" height="25" fill="#14F195"/>

  <!-- Row 3 -->
  <rect x="425" y="85" width="150" height="25" fill="#14F195"/>

  <!-- Row 4 -->
  <rect x="400" y="110" width="200" height="25" fill="#30E885"/>

  <!-- Row 5 -->
  <rect x="375" y="135" width="250" height="25" fill="#4CDB76"/>

  <!-- Row 6 -->
  <rect x="350" y="160" width="300" height="25" fill="#68CE67"/>

  <!-- Row 7 — star row -->
  <rect x="325" y="185" width="350" height="25" fill="#7AC45C"/>
  <!-- Star pixel -->
  <rect x="475" y="185" width="50" height="25" fill="#FFFFFF" filter="url(#glow8)"/>

  <!-- Row 8 -->
  <rect x="300" y="210" width="400" height="25" fill="#8CB953"/>

  <!-- Row 9 — star arms -->
  <rect x="275" y="235" width="450" height="25" fill="#9945FF"/>
  <!-- Star cross -->
  <rect x="450" y="235" width="100" height="25" fill="#14F195" filter="url(#glow8)"/>

  <!-- Row 10 -->
  <rect x="250" y="260" width="500" height="25" fill="#9945FF"/>
  <!-- Star center -->
  <rect x="475" y="260" width="50" height="25" fill="#FFFFFF" filter="url(#glow8)"/>

  <!-- Row 11 — star arms -->
  <rect x="250" y="285" width="500" height="25" fill="#9945FF"/>
  <rect x="450" y="285" width="100" height="25" fill="#14F195" filter="url(#glow8)"/>

  <!-- Row 12 -->
  <rect x="225" y="310" width="550" height="25" fill="#8B3AEE"/>

  <!-- Row 13 — star bottom -->
  <rect x="225" y="335" width="550" height="25" fill="#7B2FCC"/>
  <rect x="475" y="335" width="50" height="25" fill="#14F195" filter="url(#glow8)" opacity="0.7"/>

  <!-- Row 14 -->
  <rect x="200" y="360" width="600" height="25" fill="#7B2FCC"/>

  <!-- Row 15 -->
  <rect x="200" y="385" width="600" height="25" fill="#6B25BB"/>

  <!-- ═══ HAT BAND ═══ -->
  <!-- Row 16 -->
  <rect x="200" y="410" width="600" height="25" fill="#14F195"/>
  <rect x="200" y="410" width="150" height="25" fill="#9945FF"/>
  <rect x="650" y="410" width="150" height="25" fill="#9945FF"/>

  <!-- ═══ HAT BRIM ═══ -->
  <!-- Row 17 -->
  <rect x="125" y="435" width="750" height="25" fill="#9945FF"/>
  <!-- Row 18 -->
  <rect x="100" y="460" width="800" height="25" fill="#7B2FCC"/>
  <!-- Brim highlight -->
  <rect x="150" y="435" width="700" height="5" fill="#14F195" opacity="0.3"/>

  <!-- ═══ FACE ═══ -->
  <!-- Row 19: forehead -->
  <rect x="275" y="485" width="450" height="25" fill="url(#skin)"/>

  <!-- Row 20: forehead -->
  <rect x="250" y="510" width="500" height="25" fill="#FFCEA0"/>

  <!-- Row 21: eyes row -->
  <rect x="250" y="535" width="500" height="25" fill="#FFCEA0"/>
  <!-- Left eye -->
  <rect x="325" y="535" width="75" height="25" fill="#000000"/>
  <rect x="350" y="535" width="25" height="25" fill="#14F195" filter="url(#glow8)"/>
  <!-- Right eye -->
  <rect x="575" y="535" width="75" height="25" fill="#000000"/>
  <rect x="600" y="535" width="25" height="25" fill="#14F195" filter="url(#glow8)"/>

  <!-- Row 22: under eyes -->
  <rect x="250" y="560" width="500" height="25" fill="#F0BA85"/>

  <!-- Row 23: nose -->
  <rect x="250" y="585" width="500" height="25" fill="#F0BA85"/>
  <rect x="475" y="585" width="50" height="25" fill="#E8A870"/>

  <!-- Row 24: upper lip / mustache -->
  <rect x="275" y="610" width="450" height="25" fill="#E0E0E0"/>
  <rect x="275" y="610" width="75" height="25" fill="#D0D0D0"/>
  <rect x="650" y="610" width="75" height="25" fill="#D0D0D0"/>

  <!-- ═══ BEARD ═══ -->
  <!-- Row 25 -->
  <rect x="275" y="635" width="450" height="25" fill="#E8E8E8"/>
  <!-- Mouth -->
  <rect x="425" y="635" width="150" height="25" fill="#CC4444"/>

  <!-- Row 26 -->
  <rect x="250" y="660" width="500" height="25" fill="#E0E0E0"/>

  <!-- Row 27 -->
  <rect x="250" y="685" width="500" height="25" fill="#D0D0D0"/>

  <!-- Row 28 -->
  <rect x="275" y="710" width="450" height="25" fill="#C0C0C0"/>

  <!-- Row 29 -->
  <rect x="300" y="735" width="400" height="25" fill="#B0B0B0"/>

  <!-- Row 30: beard point -->
  <rect x="350" y="760" width="300" height="25" fill="#A8A8A8"/>

  <!-- Row 31: beard tip -->
  <rect x="400" y="785" width="200" height="25" fill="#A0A0A0"/>

  <!-- Row 32 -->
  <rect x="450" y="810" width="100" height="25" fill="#989898"/>

  <!-- ═══ ROBE (shoulders visible) ═══ -->
  <!-- Left shoulder -->
  <rect x="125" y="660" width="125" height="25" fill="#6B25BB"/>
  <rect x="100" y="685" width="150" height="75" fill="#6B25BB"/>

  <!-- Right shoulder -->
  <rect x="750" y="660" width="125" height="25" fill="#6B25BB"/>
  <rect x="750" y="685" width="150" height="75" fill="#6B25BB"/>

  <!-- Robe collar gradient pixels -->
  <rect x="200" y="660" width="50" height="50" fill="#7B2FCC"/>
  <rect x="750" y="660" width="50" height="50" fill="#7B2FCC"/>

  <!-- ═══ SPARKLE EFFECTS ═══ -->
  <g filter="url(#glow8)">
    <!-- Floating sparkles around wizard -->
    <rect x="150" y="200" width="15" height="15" fill="#14F195" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="825" y="175" width="12" height="12" fill="#9945FF" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="125" y="450" width="10" height="10" fill="#14F195" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="860" y="420" width="12" height="12" fill="#9945FF" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="175" y="600" width="8" height="8" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="825" y="580" width="10" height="10" fill="#14F195" opacity="0.5">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Tip sparkle -->
    <rect x="462" y="20" width="12" height="12" fill="#FFFFFF" opacity="0.7">
      <animate attributeName="y" values="20;8;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="510" y="12" width="8" height="8" fill="#14F195" opacity="0.5">
      <animate attributeName="y" values="12;0;12" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══ EYEBROW ACCENTS (bushy, 8-bit) ═══ -->
  <rect x="300" y="520" width="100" height="8" fill="#C0C0C0"/>
  <rect x="575" y="520" width="100" height="8" fill="#C0C0C0"/>
</svg>
