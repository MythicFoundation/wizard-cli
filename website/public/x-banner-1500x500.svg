<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="textShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <radialGradient id="bgGlow1" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="25%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.06"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9945FF" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#080810"/>
  <rect width="1500" height="500" fill="url(#bgGlow1)"/>
  <rect width="1500" height="500" fill="url(#bgGlow2)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Top gradient line -->
  <rect x="0" y="0" width="1500" height="3" fill="url(#sol)" opacity="0.8"/>

  <!-- Left side: Text content -->

  <!-- Badge -->
  <rect x="80" y="110" width="240" height="28" fill="#9945FF" opacity="0.12" stroke="#9945FF" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="200" y="129" font-family="'JetBrains Mono', monospace" font-size="11" fill="#14F195" text-anchor="middle" letter-spacing="2" font-weight="600">AI-POWERED DEVELOPMENT AGENT</text>

  <!-- WIZARD CLI title -->
  <text x="80" y="205" font-family="'Sora', sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="2">WIZARD</text>
  <text x="430" y="205" font-family="'Sora', sans-serif" font-size="72" font-weight="800" fill="url(#textShimmer)" letter-spacing="2">CLI</text>

  <!-- Subtitle -->
  <text x="80" y="245" font-family="'Inter', sans-serif" font-size="18" fill="#A0A0B0">Claude + OpenAI in your terminal with</text>
  <text x="80" y="272" font-family="'Inter', sans-serif" font-size="18" fill="#A0A0B0">
    <tspan font-weight="700" fill="#14F195">27 native Solana</tspan> blockchain tools
  </text>

  <!-- Install command box -->
  <rect x="80" y="300" width="480" height="44" fill="#0A0A14" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="96" y="327" font-family="'JetBrains Mono', monospace" font-size="13" fill="#686878">$</text>
  <text x="114" y="327" font-family="'JetBrains Mono', monospace" font-size="13" fill="#14F195">curl -sSfL https://mythic.sh/wizard | bash</text>

  <!-- Feature pills -->
  <g transform="translate(80, 370)">
    <rect width="70" height="24" fill="#9945FF" opacity="0.1" stroke="#9945FF" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="35" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9945FF" text-anchor="middle" font-weight="600">Solana</text>

    <rect x="80" width="80" height="24" fill="#14F195" opacity="0.1" stroke="#14F195" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="120" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#14F195" text-anchor="middle" font-weight="600">Mythic L2</text>

    <rect x="170" width="70" height="24" fill="#D97706" opacity="0.1" stroke="#D97706" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="205" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D97706" text-anchor="middle" font-weight="600">Claude</text>

    <rect x="250" width="70" height="24" fill="#10A37F" opacity="0.1" stroke="#10A37F" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="285" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#10A37F" text-anchor="middle" font-weight="600">OpenAI</text>

    <rect x="330" width="70" height="24" fill="#FF2D78" opacity="0.1" stroke="#FF2D78" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="365" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#FF2D78" text-anchor="middle" font-weight="600">Free Tier</text>
  </g>

  <!-- Bottom info -->
  <text x="80" y="440" font-family="'JetBrains Mono', monospace" font-size="11" fill="#404050" letter-spacing="1">wizardcli.com</text>
  <text x="260" y="440" font-family="'JetBrains Mono', monospace" font-size="11" fill="#404050">·</text>
  <text x="280" y="440" font-family="'JetBrains Mono', monospace" font-size="11" fill="#404050" letter-spacing="1">github.com/MythicFoundation/wizard-cli</text>

  <!-- Right side: Wizard silhouette placeholder area -->
  <!-- The actual wizard PNG would be composited on top in image editing -->
  <!-- For SVG, we create a stylized representation -->

  <!-- Wizard glow area -->
  <circle cx="1150" cy="250" r="180" fill="#9945FF" opacity="0.06"/>
  <circle cx="1150" cy="250" r="120" fill="#14F195" opacity="0.04"/>

  <!-- Sparkles around wizard area -->
  <g filter="url(#glow)">
    <circle cx="980" cy="130" r="3" fill="#14F195" opacity="0.7"/>
    <circle cx="1320" cy="110" r="2.5" fill="#9945FF" opacity="0.6"/>
    <circle cx="960" cy="350" r="2" fill="#9945FF" opacity="0.5"/>
    <circle cx="1340" cy="320" r="3" fill="#14F195" opacity="0.6"/>
    <circle cx="1050" cy="80" r="1.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="1280" cy="400" r="2" fill="#14F195" opacity="0.4"/>
    <circle cx="1000" cy="420" r="1.5" fill="#9945FF" opacity="0.3"/>
    <circle cx="1350" cy="200" r="2" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Fire glow (where wizard staff would be) -->
  <circle cx="1020" cy="100" r="40" fill="#FF9500" opacity="0.08"/>
  <circle cx="1020" cy="100" r="25" fill="#FFD700" opacity="0.06"/>

  <!-- $WIZCLI badge -->
  <rect x="1050" y="420" width="110" height="28" fill="#14F195" opacity="0.08" stroke="#14F195" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="1105" y="439" font-family="'Sora', sans-serif" font-size="13" fill="#14F195" text-anchor="middle" font-weight="700">$WIZCLI</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="497" width="1500" height="3" fill="url(#sol)" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M 20 20 L 20 50 M 20 20 L 50 20" stroke="#14F195" stroke-width="1.5" opacity="0.25"/>
  <path d="M 1480 20 L 1480 50 M 1480 20 L 1450 20" stroke="#9945FF" stroke-width="1.5" opacity="0.25"/>
  <path d="M 20 480 L 20 450 M 20 480 L 50 480" stroke="#9945FF" stroke-width="1.5" opacity="0.25"/>
  <path d="M 1480 480 L 1480 450 M 1480 480 L 1450 480" stroke="#14F195" stroke-width="1.5" opacity="0.25"/>
</svg>
