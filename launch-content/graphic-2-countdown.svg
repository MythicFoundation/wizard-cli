<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9945FF"/><stop offset="100%" stop-color="#14F195"/></linearGradient>
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FF2D78"/><stop offset="100%" stop-color="#FF9500"/></linearGradient>
    <radialGradient id="bg1" cx="30%" cy="50%" r="45%"><stop offset="0%" stop-color="#9945FF" stop-opacity="0.1"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="70%" cy="40%" r="40%"><stop offset="0%" stop-color="#14F195" stop-opacity="0.06"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9945FF" stroke-width="0.3" opacity="0.06"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="1200" height="675" fill="#080810"/>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#sol)" opacity="0.8"/>

  <!-- Left content -->
  <!-- Badge -->
  <rect x="80" y="80" width="140" height="28" fill="#FF2D78" opacity="0.15" stroke="#FF2D78" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="150" y="99" font-family="'JetBrains Mono',monospace" font-size="11" fill="#FF2D78" text-anchor="middle" letter-spacing="2" font-weight="700">15 MINUTES</text>

  <!-- Title -->
  <text x="80" y="185" font-family="'Sora',sans-serif" font-size="64" font-weight="800" fill="#FFFFFF">WIZARD</text>
  <text x="80" y="255" font-family="'Sora',sans-serif" font-size="64" font-weight="800" fill="url(#sol)">CLI</text>

  <text x="80" y="305" font-family="'Inter',sans-serif" font-size="18" fill="#A0A0B0">AI-powered Solana development agent</text>

  <!-- Features -->
  <text x="80" y="365" font-family="'JetBrains Mono',monospace" font-size="14" fill="#14F195">27 native blockchain tools</text>
  <text x="80" y="392" font-family="'JetBrains Mono',monospace" font-size="14" fill="#9945FF">Claude + OpenAI models</text>
  <text x="80" y="419" font-family="'JetBrains Mono',monospace" font-size="14" fill="#FF9500">YOLO mode — auto-execute</text>
  <text x="80" y="446" font-family="'JetBrains Mono',monospace" font-size="14" fill="#FF2D78">Free tier — no API key needed</text>

  <!-- Install -->
  <rect x="80" y="480" width="440" height="40" fill="#0A0A14" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="96" y="505" font-family="'JetBrains Mono',monospace" font-size="12" fill="#686878">$</text>
  <text x="112" y="505" font-family="'JetBrains Mono',monospace" font-size="12" fill="#14F195">curl -sSfL https://mythic.sh/wizard | bash</text>

  <!-- $WIZCLI badge -->
  <rect x="80" y="550" width="160" height="36" fill="#14F195" opacity="0.1" stroke="#14F195" stroke-width="1" stroke-opacity="0.4"/>
  <text x="160" y="574" font-family="'Sora',sans-serif" font-size="18" fill="#14F195" text-anchor="middle" font-weight="800">$WIZCLI</text>
  <text x="260" y="574" font-family="'Inter',sans-serif" font-size="14" fill="#686878">launching on PumpFun</text>

  <!-- Right side: wizard glow area -->
  <circle cx="900" cy="340" r="200" fill="#9945FF" opacity="0.05"/>
  <circle cx="900" cy="340" r="130" fill="#14F195" opacity="0.03"/>

  <!-- Sparkles -->
  <circle cx="750" cy="150" r="3" fill="#14F195" opacity="0.7" filter="url(#glow)"/>
  <circle cx="1050" cy="120" r="2.5" fill="#9945FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="720" cy="500" r="2" fill="#9945FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1080" cy="480" r="3" fill="#14F195" opacity="0.5" filter="url(#glow)"/>
  <circle cx="800" cy="80" r="1.5" fill="#FFFFFF" opacity="0.3" filter="url(#glow)"/>
  <circle cx="1000" cy="550" r="2" fill="#FF2D78" opacity="0.4" filter="url(#glow)"/>

  <!-- Fire glow -->
  <circle cx="780" cy="140" r="50" fill="#FF9500" opacity="0.06"/>
  <circle cx="780" cy="140" r="30" fill="#FFD700" opacity="0.04"/>

  <!-- URL -->
  <text x="80" y="630" font-family="'JetBrains Mono',monospace" font-size="12" fill="#404050" letter-spacing="1">wizardcli.com</text>

  <rect x="0" y="672" width="1200" height="3" fill="url(#sol)" opacity="0.5"/>
</svg>
