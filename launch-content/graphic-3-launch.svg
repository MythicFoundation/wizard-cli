<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9945FF"/><stop offset="100%" stop-color="#14F195"/></linearGradient>
    <radialGradient id="bg1" cx="30%" cy="40%" r="50%"><stop offset="0%" stop-color="#9945FF" stop-opacity="0.12"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="75%" cy="50%" r="40%"><stop offset="0%" stop-color="#14F195" stop-opacity="0.08"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9945FF" stroke-width="0.3" opacity="0.06"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <rect width="1200" height="675" fill="#080810"/>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Top accent - thicker for launch -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#sol)"/>

  <!-- LIVE badge -->
  <rect x="80" y="70" width="80" height="30" fill="#14F195" opacity="0.15" stroke="#14F195" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="102" cy="85" r="4" fill="#14F195"/>
  <text x="130" y="90" font-family="'JetBrains Mono',monospace" font-size="12" fill="#14F195" font-weight="700">LIVE</text>

  <!-- Title -->
  <text x="80" y="170" font-family="'Sora',sans-serif" font-size="22" fill="#9945FF" letter-spacing="6" font-weight="600">$WIZCLI IS LIVE ON PUMPFUN</text>

  <text x="80" y="260" font-family="'Sora',sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">WIZARD</text>
  <text x="430" y="260" font-family="'Sora',sans-serif" font-size="72" font-weight="800" fill="url(#sol)">CLI</text>

  <text x="80" y="310" font-family="'Inter',sans-serif" font-size="20" fill="#A0A0B0">AI-powered Solana &amp; Mythic L2 development agent</text>

  <!-- Tool count highlight -->
  <rect x="80" y="340" width="200" height="50" fill="#14F195" opacity="0.08" stroke="#14F195" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="180" y="372" font-family="'Sora',sans-serif" font-size="22" fill="#14F195" text-anchor="middle" font-weight="800">27 TOOLS</text>

  <rect x="290" y="340" width="200" height="50" fill="#9945FF" opacity="0.08" stroke="#9945FF" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="390" y="372" font-family="'Sora',sans-serif" font-size="22" fill="#9945FF" text-anchor="middle" font-weight="800">11 MODELS</text>

  <rect x="500" y="340" width="200" height="50" fill="#FF2D78" opacity="0.08" stroke="#FF2D78" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="372" font-family="'Sora',sans-serif" font-size="22" fill="#FF2D78" text-anchor="middle" font-weight="800">FREE TIER</text>

  <!-- Install command -->
  <rect x="80" y="420" width="500" height="44" fill="#0A0A14" stroke="#14F195" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="96" y="447" font-family="'JetBrains Mono',monospace" font-size="13" fill="#686878">$</text>
  <text x="114" y="447" font-family="'JetBrains Mono',monospace" font-size="13" fill="#14F195">curl -sSfL https://mythic.sh/wizard | bash</text>

  <!-- Feature pills -->
  <g transform="translate(80, 490)">
    <rect width="80" height="26" fill="#9945FF" opacity="0.1" stroke="#9945FF" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="40" y="17" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9945FF" text-anchor="middle" font-weight="600">Solana</text>
    <rect x="90" width="90" height="26" fill="#14F195" opacity="0.1" stroke="#14F195" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="135" y="17" font-family="'JetBrains Mono',monospace" font-size="10" fill="#14F195" text-anchor="middle" font-weight="600">Mythic L2</text>
    <rect x="190" width="70" height="26" fill="#D97706" opacity="0.1" stroke="#D97706" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="225" y="17" font-family="'JetBrains Mono',monospace" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">Claude</text>
    <rect x="270" width="70" height="26" fill="#10A37F" opacity="0.1" stroke="#10A37F" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="305" y="17" font-family="'JetBrains Mono',monospace" font-size="10" fill="#10A37F" text-anchor="middle" font-weight="600">OpenAI</text>
    <rect x="350" width="90" height="26" fill="#FF9500" opacity="0.1" stroke="#FF9500" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="395" y="17" font-family="'JetBrains Mono',monospace" font-size="10" fill="#FF9500" text-anchor="middle" font-weight="600">Firedancer</text>
  </g>

  <!-- Bottom links -->
  <text x="80" y="580" font-family="'JetBrains Mono',monospace" font-size="14" fill="#14F195" letter-spacing="2" font-weight="600">wizardcli.com</text>
  <text x="320" y="580" font-family="'JetBrains Mono',monospace" font-size="12" fill="#404050">github.com/MythicFoundation/wizard-cli</text>

  <!-- $WIZCLI prominent -->
  <rect x="80" y="600" width="180" height="40" fill="url(#sol)" opacity="0.15" stroke="url(#sol)" stroke-width="1"/>
  <text x="170" y="626" font-family="'Sora',sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="800">$WIZCLI</text>

  <!-- Right: wizard area glow -->
  <circle cx="950" cy="340" r="220" fill="#9945FF" opacity="0.04"/>
  <circle cx="950" cy="340" r="150" fill="#14F195" opacity="0.03"/>

  <!-- Sparkles -->
  <circle cx="780" cy="100" r="4" fill="#14F195" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1100" cy="80" r="3" fill="#9945FF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="750" cy="520" r="3" fill="#9945FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1120" cy="500" r="4" fill="#14F195" opacity="0.6" filter="url(#glow)"/>
  <circle cx="830" cy="60" r="2" fill="#FFFFFF" opacity="0.4" filter="url(#glow)"/>
  <circle cx="1050" cy="580" r="2.5" fill="#FF2D78" opacity="0.5" filter="url(#glow)"/>
  <circle cx="700" cy="300" r="2" fill="#14F195" opacity="0.3" filter="url(#glow)"/>
  <circle cx="1150" cy="250" r="2" fill="#9945FF" opacity="0.4" filter="url(#glow)"/>

  <!-- Fire glow for wizard staff area -->
  <circle cx="820" cy="120" r="60" fill="#FF9500" opacity="0.06"/>
  <circle cx="820" cy="120" r="35" fill="#FFD700" opacity="0.05"/>

  <!-- Corner accents -->
  <path d="M 20 20 L 20 50 M 20 20 L 50 20" stroke="#14F195" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1180 20 L 1180 50 M 1180 20 L 1150 20" stroke="#9945FF" stroke-width="1.5" opacity="0.3"/>
  <path d="M 20 655 L 20 625 M 20 655 L 50 655" stroke="#9945FF" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1180 655 L 1180 625 M 1180 655 L 1150 655" stroke="#14F195" stroke-width="1.5" opacity="0.3"/>

  <rect x="0" y="671" width="1200" height="4" fill="url(#sol)"/>
</svg>
