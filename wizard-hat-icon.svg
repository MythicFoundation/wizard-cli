<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#110828"/>
      <stop offset="100%" stop-color="#060312"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="500" cy="500" r="490" fill="url(#bg)"/>
  <circle cx="500" cy="500" r="487" fill="none" stroke="url(#sol)" stroke-width="2.5" opacity="0.25"/>

  <g transform="translate(500,540) scale(3.2)" fill="url(#sol)">
    <!-- Brim — wide oval, thick, with inner cutout ring -->
    <ellipse cx="0" cy="58" rx="88" ry="28"/>
    <ellipse cx="0" cy="58" rx="76" ry="22" fill="#110828"/>
    <ellipse cx="0" cy="58" rx="72" ry="19" fill="url(#sol)"/>
    <ellipse cx="0" cy="58" rx="62" ry="14" fill="#110828"/>

    <!-- Hat body — wide base tapering up, tip curls hard right -->
    <path d="
      M -52 48
      L -28 -30
      L -16 -68
      L -6 -92
      L 4 -108
      L 16 -118
      L 28 -120
      Q 44 -120 54 -110
      Q 64 -98 70 -82
      Q 78 -62 80 -48
      Q 82 -36 78 -30
      Q 72 -24 64 -28
      Q 56 -34 48 -44
      Q 42 -52 38 -56
      L 30 -40
      L 44 6
      L 54 42
      L 56 48
      Z
    "/>

    <!-- Band stripes — 3 curved lines across lower hat -->
    <path d="M -44 28 Q 0 18 48 28" fill="none" stroke="#110828" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M -48 37 Q 0 27 52 37" fill="none" stroke="#110828" stroke-width="3.8" stroke-linecap="round"/>
    <path d="M -50 45 Q 0 36 54 45" fill="none" stroke="#110828" stroke-width="3" stroke-linecap="round"/>

    <!-- Crease line from tip down center -->
    <path d="M -6 -92 L 20 10" fill="none" stroke="#110828" stroke-width="1.8" opacity="0.6"/>

    <!-- 4-pointed stars on hat body -->
    <!-- Star 1 — large, center-left -->
    <path d="M -12 -10 L -9 -20 L -6 -10 L 4 -7 L -6 -4 L -9 6 L -12 -4 L -22 -7 Z" fill="#110828"/>

    <!-- Star 2 — upper right -->
    <path d="M 24 -70 L 26 -78 L 28 -70 L 36 -68 L 28 -66 L 26 -58 L 24 -66 L 16 -68 Z" fill="#110828"/>

    <!-- Star 3 — small, mid right -->
    <path d="M 36 -20 L 38 -26 L 40 -20 L 46 -18 L 40 -16 L 38 -10 L 36 -16 L 30 -18 Z" fill="#110828"/>

    <!-- Star 4 — tiny, on curl -->
    <path d="M 56 -68 L 57.5 -73 L 59 -68 L 64 -66.5 L 59 -65 L 57.5 -60 L 56 -65 L 51 -66.5 Z" fill="#110828"/>
  </g>

  <!-- Floating sparkles — upper left cluster (matching reference) -->
  <g fill="url(#sol)">
    <!-- Large 4-pointed sparkle -->
    <path d="M 205 225 L 215 190 L 225 225 L 260 235 L 225 245 L 215 280 L 205 245 L 170 235 Z"/>

    <!-- Medium 4-pointed sparkle -->
    <path d="M 275 330 L 281 312 L 287 330 L 305 336 L 287 342 L 281 360 L 275 342 L 257 336 Z" opacity="0.8"/>

    <!-- Small 4-pointed sparkle -->
    <path d="M 185 340 L 189 328 L 193 340 L 205 344 L 193 348 L 189 360 L 185 348 L 173 344 Z" opacity="0.65"/>

    <!-- Dot -->
    <circle cx="245" cy="280" r="7" opacity="0.7"/>

    <!-- Tiny diamond -->
    <rect x="296" y="268" width="10" height="10" rx="1.5" transform="rotate(45 301 273)" opacity="0.55"/>
  </g>
</svg>
