<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Solana gradient -->
    <linearGradient id="sol" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>

    <!-- Hat body: bottom purple → top green -->
    <linearGradient id="hat" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#7B2FCC"/>
      <stop offset="15%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#6EBB6A"/>
      <stop offset="75%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#B0FFE0"/>
    </linearGradient>

    <!-- Hat dark side -->
    <linearGradient id="hatDark" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Brim gradient -->
    <linearGradient id="brim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FCC"/>
      <stop offset="40%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>

    <!-- Band -->
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>

    <!-- Star -->
    <linearGradient id="star" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#B0FFE0"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="starGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="15" result="sg"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="sg2"/>
      <feMerge><feMergeNode in="sg"/><feMergeNode in="sg2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1C0A45"/>
      <stop offset="60%" stop-color="#0C0520"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#14F195" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="500" cy="500" r="490" fill="url(#bg)"/>
  <circle cx="500" cy="500" r="490" fill="url(#aura)"/>

  <!-- Outer ring -->
  <circle cx="500" cy="500" r="488" fill="none" stroke="url(#sol)" stroke-width="3" opacity="0.4"/>

  <!-- ═══ HAT ═══ -->
  <g filter="url(#shadow)">

    <!-- Aura behind hat -->
    <path d="M 320 760 L 455 195 Q 500 50 545 195 L 680 680 Q 580 640 500 650 Q 420 640 320 680 Z"
          fill="#9945FF" opacity="0.25" filter="url(#bigGlow)"/>

    <!-- Hat body -->
    <path d="M 320 760 L 455 195 Q 500 50 545 195 L 680 680 Q 580 640 500 650 Q 420 640 320 680 Z"
          fill="url(#hat)"/>

    <!-- Dark side shading -->
    <path d="M 320 760 L 455 195 Q 500 50 510 140 L 400 650 Q 360 645 320 660 Z"
          fill="url(#hatDark)"/>

    <!-- Right edge highlight -->
    <path d="M 545 195 L 670 670" fill="none" stroke="#14F195" stroke-width="1.5" opacity="0.25"/>

    <!-- Tip highlight -->
    <path d="M 455 195 Q 500 50 545 195" fill="none" stroke="#B0FFE0" stroke-width="2" opacity="0.4"/>

    <!-- ── Band ── -->
    <path d="M 328 710 Q 420 685 500 690 Q 575 685 670 710 L 665 735 Q 570 710 500 715 Q 425 710 335 735 Z"
          fill="url(#band)" opacity="0.8"/>
    <path d="M 335 718 Q 425 696 500 700 Q 570 696 660 718"
          fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"/>

    <!-- ── Brim ── -->
    <ellipse cx="498" cy="758" rx="250" ry="70" fill="url(#brim)"/>
    <ellipse cx="498" cy="755" rx="240" ry="62" fill="none" stroke="#14F195" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="498" cy="752" rx="235" ry="55" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.12"/>

    <!-- Brim underside shadow -->
    <ellipse cx="498" cy="765" rx="220" ry="50" fill="#000000" opacity="0.15"/>
  </g>

  <!-- ═══ STAR ═══ -->
  <g filter="url(#starGlow)">
    <polygon points="500,280 516,335 572,335 526,368 543,422 500,392 457,422 474,368 428,335 484,335"
             fill="url(#star)"/>
    <circle cx="500" cy="360" r="10" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- ═══ SPARKLES ═══ -->
  <g filter="url(#glow)">
    <circle cx="270" cy="320" r="6" fill="#14F195" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.1;0.85" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;3;6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="280" r="5" fill="#9945FF" opacity="0.7">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;2.5;5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="560" r="4.5" fill="#9945FF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.05;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="520" r="4" fill="#14F195" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.05;0.5" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="200" r="3" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="690" cy="170" r="2.5" fill="#14F195" opacity="0.35">
      <animate attributeName="opacity" values="0.05;0.5;0.05" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="700" r="3" fill="#14F195" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="670" r="3.5" fill="#9945FF" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.7s" repeatCount="indefinite"/>
    </circle>

    <!-- Hat tip particles -->
    <circle cx="500" cy="55" r="4" fill="#B0FFE0" opacity="0.7">
      <animate attributeName="cy" values="55;30;55" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="492" cy="40" r="2.5" fill="#14F195" opacity="0.5">
      <animate attributeName="cy" values="40;15;40" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="45" r="2" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="cy" values="45;20;45" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
