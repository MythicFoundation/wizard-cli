<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- The Wizard Gradient: violet → purple → electric green → cyan -->
    <linearGradient id="wizGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B1FDF"/>
      <stop offset="25%" stop-color="#7B2FFF"/>
      <stop offset="45%" stop-color="#9945FF"/>
      <stop offset="65%" stop-color="#14F195"/>
      <stop offset="85%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>

    <!-- Hat body gradient (bottom to top) -->
    <linearGradient id="hatBody" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#4A1CB8"/>
      <stop offset="20%" stop-color="#7B2FFF"/>
      <stop offset="45%" stop-color="#9945FF"/>
      <stop offset="65%" stop-color="#6BDD3A"/>
      <stop offset="80%" stop-color="#14F195"/>
      <stop offset="95%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#AAFFEE"/>
    </linearGradient>

    <!-- Hat sheen (left highlight) -->
    <linearGradient id="hatSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Star fill -->
    <linearGradient id="starFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="40%" stop-color="#AAFFAA"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <!-- Band gradient -->
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="30%" stop-color="#FF6B35"/>
      <stop offset="60%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>

    <!-- Brim gradient -->
    <linearGradient id="brimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B1FDF"/>
      <stop offset="30%" stop-color="#7B2FFF"/>
      <stop offset="50%" stop-color="#9945FF"/>
      <stop offset="70%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>

    <!-- Background circle gradient -->
    <radialGradient id="bgCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="50%" stop-color="#0E0620"/>
      <stop offset="100%" stop-color="#060210"/>
    </radialGradient>

    <!-- Ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#7B2FFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#14F195" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bigGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="35" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="g2"/>
      <feMerge><feMergeNode in="g1"/><feMergeNode in="g2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Shadow -->
    <filter id="hatShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="500" cy="500" r="480" fill="url(#bgCircle)"/>
  <circle cx="500" cy="500" r="480" fill="url(#ambientGlow)"/>

  <!-- Outer ring -->
  <circle cx="500" cy="500" r="478" fill="none" stroke="url(#wizGrad)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="500" cy="500" r="470" fill="none" stroke="url(#wizGrad)" stroke-width="0.5" opacity="0.15"/>

  <!-- ═══ THE WIZARD HAT ═══ -->
  <g filter="url(#hatShadow)">

    <!-- Hat glow aura -->
    <path d="M 350 750 L 460 220 Q 500 80 540 220 L 640 620 Q 550 590 495 600 Q 430 590 350 620 Z"
          fill="#7B2FFF" opacity="0.4" filter="url(#outerGlow)"/>

    <!-- Hat body -->
    <path d="M 350 750 L 460 220 Q 500 80 540 220 L 640 620 Q 550 590 495 600 Q 430 590 350 620 Z"
          fill="url(#hatBody)"/>

    <!-- Hat sheen overlay -->
    <path d="M 360 740 L 462 225 Q 500 90 520 180 L 420 600 Q 390 595 360 610 Z"
          fill="url(#hatSheen)"/>

    <!-- Hat edge highlight (right side) -->
    <path d="M 540 220 L 635 610" fill="none" stroke="#14F195" stroke-width="1" opacity="0.3"/>

    <!-- Hat tip glow -->
    <circle cx="500" cy="85" r="20" fill="#14F195" opacity="0.15" filter="url(#outerGlow)"/>

    <!-- ── Hat Band ── -->
    <path d="M 355 680 Q 420 660 500 665 Q 575 660 640 680 L 635 700 Q 570 680 500 685 Q 425 680 360 700 Z"
          fill="url(#bandGrad)" opacity="0.85"/>
    <!-- Band highlight -->
    <path d="M 360 685 Q 430 668 500 672 Q 570 668 635 685"
          fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.25"/>

    <!-- ── Brim ── -->
    <ellipse cx="498" cy="748" rx="230" ry="65" fill="url(#brimGrad)" opacity="0.9"/>
    <!-- Brim highlight ring -->
    <ellipse cx="498" cy="745" rx="220" ry="58" fill="none" stroke="#14F195" stroke-width="1.2" opacity="0.3"/>
    <!-- Brim inner shadow -->
    <ellipse cx="498" cy="750" rx="200" ry="45" fill="none" stroke="#000000" stroke-width="2" opacity="0.2"/>
    <!-- Brim top edge shine -->
    <ellipse cx="498" cy="740" rx="215" ry="50" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.15"/>

    <!-- ═══ STAR ON HAT ═══ -->
    <g filter="url(#starGlow)">
      <!-- Outer glow star -->
      <path d="M 500 300 L 512 345 L 558 345 L 520 372 L 533 418 L 500 395 L 467 418 L 480 372 L 442 345 L 488 345 Z"
            fill="#14F195" opacity="0.3" transform="scale(1.3) translate(-115, -72)"/>
      <!-- Main star -->
      <path d="M 500 300 L 512 345 L 558 345 L 520 372 L 533 418 L 500 395 L 467 418 L 480 372 L 442 345 L 488 345 Z"
            fill="url(#starFill)"/>
      <!-- Star center dot -->
      <circle cx="500" cy="362" r="8" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <!-- Small decorative stars on hat -->
    <g filter="url(#neon)">
      <path d="M 440 500 L 444 512 L 456 512 L 446 520 L 450 532 L 440 525 L 430 532 L 434 520 L 424 512 L 436 512 Z"
            fill="#14F195" opacity="0.5"/>
      <path d="M 555 460 L 558 468 L 566 468 L 560 474 L 562 482 L 555 477 L 548 482 L 550 474 L 544 468 L 552 468 Z"
            fill="#14F195" opacity="0.4"/>
      <path d="M 470 430 L 472 436 L 478 436 L 473 440 L 475 446 L 470 443 L 465 446 L 467 440 L 462 436 L 468 436 Z"
            fill="#9945FF" opacity="0.5"/>
    </g>
  </g>

  <!-- ═══ FLOATING SPARKLES ═══ -->
  <g filter="url(#neon)">
    <!-- Large sparkles -->
    <circle cx="280" cy="300" r="5" fill="#14F195" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.15;0.9" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;3;5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="250" r="4.5" fill="#14F195" opacity="0.8">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4.5;2.5;4.5" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="550" r="4" fill="#FF2D78" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="500" r="3.5" fill="#FF9500" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="700" r="3" fill="#9945FF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.05;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="680" r="3.5" fill="#7B2FFF" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Small sparkles -->
    <circle cx="350" cy="200" r="2" fill="#FFFFFF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="180" r="1.8" fill="#14F195" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="420" r="1.5" fill="#14F195" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="380" r="2" fill="#14F195" opacity="0.5">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="830" r="1.5" fill="#9945FF" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="840" r="2" fill="#14F195" opacity="0.3">
      <animate attributeName="opacity" values="0;0.5;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Particle trail from hat tip -->
    <circle cx="500" cy="65" r="3" fill="#FFFFFF" opacity="0.7">
      <animate attributeName="cy" values="65;40;65" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="495" cy="50" r="2" fill="#14F195" opacity="0.5">
      <animate attributeName="cy" values="50;25;50" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="508" cy="55" r="1.5" fill="#14F195" opacity="0.4">
      <animate attributeName="cy" values="55;30;55" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom text: "WIZARD CLI" -->
  <text x="500" y="920" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="48" font-weight="800" fill="url(#wizGrad)" text-anchor="middle" letter-spacing="12" opacity="0.8">WIZARD CLI</text>
  <rect x="330" y="935" width="340" height="2" rx="1" fill="url(#wizGrad)" opacity="0.4"/>
</svg>
